<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Calculator</title>
    <style>
        /* CSS: Layout and Design */
        body {
            background-color: #121212;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
        }

        .calculator {
            background-color: #000;
            padding: 20px;
            border-radius: 25px;
            width: 320px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        #screen {
            width: 100%;
            height: 100px;
            background: transparent;
            border: none;
            color: #fff;
            text-align: right;
            font-size: 45px;
            margin-bottom: 10px;
            padding: 10px;
            outline: none;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        button {
            height: 65px;
            width: 65px;
            border-radius: 50%;
            border: none;
            font-size: 22px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        /* Colors */
        .num { background-color: #333; color: white; }
        .op { background-color: #f1a33c; color: white; }
        .special { background-color: #a5a5a5; color: black; }
        .zero { width: 145px; border-radius: 40px; grid-column: span 2; }

        button:active { opacity: 0.7; }
    </style>
</head>
<body>

    <div class="calculator">
        <input type="text" id="screen" value="0" readonly>
        <div class="buttons">
            <button onclick="clearAll()" class="special">AC</button>
            <button onclick="backspace()" class="special">C</button>
            <button onclick="setOp('%')" class="special">%</button>
            <button onclick="setOp('/')" class="op">÷</button>

            <button onclick="addNum('7')" class="num">7</button>
            <button onclick="addNum('8')" class="num">8</button>
            <button onclick="addNum('9')" class="num">9</button>
            <button onclick="setOp('*')" class="op">×</button>

            <button onclick="addNum('4')" class="num">4</button>
            <button onclick="addNum('5')" class="num">5</button>
            <button onclick="addNum('6')" class="num">6</button>
            <button onclick="setOp('-')" class="op">−</button>

            <button onclick="addNum('1')" class="num">1</button>
            <button onclick="addNum('2')" class="num">2</button>
            <button onclick="addNum('3')" class="num">3</button>
            <button onclick="setOp('+')" class="op">+</button>

            <button onclick="addNum('0')" class="num zero">0</button>
            <button onclick="addNum('.')" class="num">.</button>
            <button onclick="solve()" class="op">=</button>
        </div>
    </div>

    <script>
        // JS: Logic
        let display = document.getElementById('screen');

        function addNum(n) {
            if (display.value === "0") display.value = n;
            else display.value += n;
        }

        function setOp(op) {
            let lastChar = display.value.slice(-1);
            if (["+", "-", "*", "/"].includes(lastChar)) {
                display.value = display.value.slice(0, -1) + op;
            } else {
                display.value += op;
            }
        }

        function clearAll() {
            display.value = "0";
        }

        function backspace() {
            display.value = display.value.length > 1 ? display.value.slice(0, -1) : "0";
        }

        function solve() {
            try {
                display.value = eval(display.value);
            } catch {
                display.value = "Error";
                setTimeout(clearAll, 1000);
            }
        }
    </script>
</body>
</html>
