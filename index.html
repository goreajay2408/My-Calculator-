<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Advanced Calculator</title>
    <style>
        :root {
            --bg: #121212;
            --card: #000;
            --text: white;
            --btn-num: #333;
        }

        /* Light Mode Classes */
        .light-theme {
            --bg: #f4f4f4;
            --card: #ffffff;
            --text: #000;
            --btn-num: #e0e0e0;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            transition: 0.3s;
        }

        .calculator {
            background-color: var(--card);
            padding: 20px;
            border-radius: 25px;
            width: 340px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        #screen {
            width: 100%;
            height: 80px;
            background: transparent;
            border: none;
            color: var(--text);
            text-align: right;
            font-size: 35px;
            margin-bottom: 5px;
            padding: 10px;
            outline: none;
        }

        .history-display {
            text-align: right;
            font-size: 14px;
            color: gray;
            height: 20px;
            margin-bottom: 10px;
            padding-right: 10px;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        button {
            height: 60px;
            border-radius: 15px;
            border: none;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            background-color: var(--btn-num);
            color: var(--text);
        }

        .op { background-color: #f1a33c; color: white; }
        .spec { background-color: #a5a5a5; color: black; }
        
        .theme-btn {
            margin-bottom: 15px;
            padding: 8px 15px;
            border-radius: 20px;
            border: none;
            cursor: pointer;
            background: #007bff;
            color: white;
        }

        /* History List Styling */
        .history-panel {
            margin-top: 20px;
            width: 320px;
            max-height: 150px;
            overflow-y: auto;
            background: rgba(128, 128, 128, 0.1);
            padding: 10px;
            border-radius: 10px;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <button class="theme-btn" onclick="toggleTheme()">Switch Theme</button>

    <div class="calculator">
        <div id="history-val" class="history-display"></div>
        <input type="text" id="screen" value="0" readonly>
        <div class="buttons">
            <button onclick="clearAll()" class="spec">AC</button>
            <button onclick="backspace()" class="spec">C</button>
            <button onclick="mathFunc('sqrt')" class="spec">√</button>
            <button onclick="setOp('/')" class="op">÷</button>

            <button onclick="addNum('7')">7</button>
            <button onclick="addNum('8')">8</button>
            <button onclick="addNum('9')">9</button>
            <button onclick="setOp('*')" class="op">×</button>

            <button onclick="addNum('4')">4</button>
            <button onclick="addNum('5')">5</button>
            <button onclick="addNum('6')">6</button>
            <button onclick="setOp('-')" class="op">−</button>

            <button onclick="addNum('1')">1</button>
            <button onclick="addNum('2')">2</button>
            <button onclick="addNum('3')">3</button>
            <button onclick="setOp('+')" class="op">+</button>

            <button onclick="addNum('0')">0</button>
            <button onclick="addNum('.')">.</button>
            <button onclick="mathFunc('pi')">π</button>
            <button onclick="solve()" class="op">=</button>
        </div>
    </div>

    <div class="history-panel" id="history-panel">
        <strong>History:</strong>
        <div id="history-list"></div>
    </div>

    <script>
        let screen = document.getElementById('screen');
        let historyVal = document.getElementById('history-val');
        let historyList = document.getElementById('history-list');

        function addNum(n) {
            if (screen.value === "0") screen.value = n;
            else screen.value += n;
        }

        function setOp(op) {
            screen.value += op;
        }

        function clearAll() {
            screen.value = "0";
            historyVal.innerText = "";
        }

        function backspace() {
            screen.value = screen.value.length > 1 ? screen.value.slice(0, -1) : "0";
        }

        function mathFunc(type) {
            if(type === 'sqrt') screen.value = Math.sqrt(eval(screen.value));
            if(type === 'pi') screen.value = Math.PI.toFixed(4);
        }

        function solve() {
            try {
                let expression = screen.value;
                let result = eval(expression);
                
                // Add to History
                historyVal.innerText = expression + " =";
                screen.value = result;

                let log = document.createElement('div');
                log.innerText = `${expression} = ${result}`;
                historyList.prepend(log);
            } catch {
                screen.value = "Error";
            }
        }

        function toggleTheme() {
            document.body.classList.toggle('light-theme');
        }
    </script>
</body>
</html>
